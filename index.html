<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GesDoc</title>

<style>
/* ================= BASE ================= */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui; }

:root {
  --blue-50:#E6F1FB; --blue-600:#185FA5; --blue-800:#0C447C; --blue-900:#042C53;
  --green-600:#3B6D11; --red-600:#A32D2D; --amber-400:#BA7517;
  --gray-600:#5F5E5A;
}

.app { min-height: 100vh; }

/* LOGIN */
.login-page { display:flex; align-items:center; justify-content:center; height:100vh; background:var(--blue-900); }
.login-card { background:white; padding:30px; border-radius:12px; width:340px; }
.form-input { width:100%; padding:8px; margin-top:5px; margin-bottom:12px; }
.btn { padding:8px 12px; cursor:pointer; border:1px solid #ccc; background:white; }
.btn-primary { background:var(--blue-800); color:white; border:none; }

/* LAYOUT */
.header { background:var(--blue-800); color:white; padding:10px 20px; display:flex; justify-content:space-between; }
.layout { display:flex; }
.sidebar { width:200px; background:#f5f5f5; min-height:100vh; padding:10px; }
.main { flex:1; padding:20px; }

/* TABLE */
table { width:100%; border-collapse: collapse; }
th, td { padding:10px; border-bottom:1px solid #ddd; }

/* MODAL */
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:#00000066;
display:none; align-items:center; justify-content:center; }
.modal-content { background:white; padding:20px; width:400px; border-radius:10px; }

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <h3>GesDoc Login</h3>

    <input id="email" class="form-input" placeholder="correo">
    <input id="pass" type="password" class="form-input" placeholder="contraseña">

    <button class="btn btn-primary" onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <div class="header">
    <div>GesDoc</div>
    <div><button onclick="logout()">Salir</button></div>
  </div>

  <div class="layout">

    <div class="sidebar">
      <button onclick="show('docs')">Documentos</button><br><br>
      <button onclick="show('users')">Usuarios</button><br><br>
      <button onclick="show('new')">Nuevo Doc</button>
    </div>

    <div class="main">

      <!-- DOCUMENTOS -->
      <div id="docsPage">
        <h3>Documentos</h3>
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Estado</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="docsTable"></tbody>
        </table>
      </div>

      <!-- USUARIOS -->
      <div id="usersPage" class="hidden">
        <h3>Usuarios</h3>
        <table>
          <tbody id="usersTable"></tbody>
        </table>
      </div>

      <!-- NUEVO -->
      <div id="newPage" class="hidden">
        <h3>Nuevo documento</h3>
        <input id="docName" class="form-input" placeholder="Nombre">

        <button class="btn btn-primary" onclick="addDoc()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Aprobar</h3>
    <p id="modalText"></p>
    <button onclick="approve()">Aprobar</button>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>
/* ================= STATE ================= */

let state = JSON.parse(localStorage.getItem("gesdoc")) || {
  users: [
    {id:1, name:"Admin", email:"admin", pass:"123"}
  ],
  docs: []
};

let currentUser = null;
let selectedDoc = null;

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("gesdoc", JSON.stringify(state));
}

/* ================= LOGIN ================= */
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const user = state.users.find(u=>u.email===email && u.pass===pass);

  if(!user){
    alert("error login");
    return;
  }

  currentUser = user;

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  render();
}

/* ================= LOGOUT ================= */
function logout(){
  location.reload();
}

/* ================= NAV ================= */
function show(page){
  document.getElementById("docsPage").classList.add("hidden");
  document.getElementById("usersPage").classList.add("hidden");
  document.getElementById("newPage").classList.add("hidden");

  document.getElementById(page+"Page").classList.remove("hidden");
}

/* ================= DOCS ================= */
function addDoc(){
  const name = document.getElementById("docName").value;

  state.docs.push({
    id:Date.now(),
    name,
    status:"pendiente"
  });

  save();
  render();
}

function openModal(id){
  selectedDoc = id;
  const doc = state.docs.find(d=>d.id===id);
  document.getElementById("modalText").innerText = doc.name;
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function approve(){
  const doc = state.docs.find(d=>d.id===selectedDoc);
  doc.status = "aprobado";

  save();
  render();
  closeModal();
}

/* ================= RENDER ================= */
function render(){

  const docs = document.getElementById("docsTable");
  docs.innerHTML = state.docs.map(d=>
    `<tr>
      <td>${d.name}</td>
      <td>${d.status}</td>
      <td><button onclick="openModal(${d.id})">ver</button></td>
    </tr>`
  ).join("");

  const users = document.getElementById("usersTable");
  users.innerHTML = state.users.map(u=>
    `<tr>
      <td>${u.name}</td>
      <td>${u.email}</td>
    </tr>`
  ).join("");
}

render();
</script>

</body>
</html>
