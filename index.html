<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GesDoc - Sistema de Aprobación</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>

    <div class="app" id="app">
        <div id="loginPage" class="login-page">
            <div class="login-card">
                <h2>GesDoc - Acceso</h2>
                <div class="form-group">
                    <label>Correo</label>
                    <input class="form-input" type="email" id="loginEmail" value="admin@empresa.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input class="form-input" type="password" id="loginPass" value="admin123">
                </div>
                <div id="loginError" style="color:red; font-size:12px; margin-bottom:10px; display:none;">Credenciales incorrectas</div>
                <button class="btn btn-primary" onclick="doLogin()">Iniciar sesión</button>
            </div>
        </div>

        <div id="mainApp" class="hidden">
            <div class="header">
                <span>GesDoc - Sistema</span>
                <span id="headerUserName"></span>
            </div>
            <div class="layout">
                <div class="sidebar">
                    <div class="sidebar-item active" id="nav-dashboard" onclick="showPage('dashboard')">Dashboard</div>
                </div>
                <div class="main">
                    <div id="page-dashboard">
                        <h2>Dashboard</h2>
                        <div id="statsGrid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
