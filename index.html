<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GesDoc - Sistema de Aprobación</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
    <style>
        /* ... (Mantuve todos tus estilos originales) ... */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui; background: #f5f5f3; }
        .hidden { display: none !important; }
        .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0c447c; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; width: 350px; }
        .header { background: #0c447c; color: white; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .layout { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 220px; background: white; border-right: 1px solid #e0e0db; padding: 1rem; }
        .main { flex: 1; padding: 2rem; }
        .card { background: white; padding: 1rem; border-radius: 8px; border: 1px solid #e0e0db; }
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: 1px solid #ccc; background: white; }
        .btn-primary { background: #0c447c; color: white; border: none; }
        .table { width: 100%; border-collapse: collapse; }
        .table td, .table th { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div id="app">
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h2>GesDoc Login</h2>
            <input type="email" id="loginEmail" class="form-input" style="width:100%; margin: 10px 0;" value="admin@empresa.com">
            <input type="password" id="loginPass" class="form-input" style="width:100%; margin: 10px 0;" value="admin123">
            <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Ingresar</button>
            <div id="loginError" style="color:red; margin-top:10px; display:none;">Credenciales incorrectas</div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="header">
            <span>GesDoc</span>
            <span id="headerUserName"></span>
        </div>
        <div class="layout">
            <div class="sidebar">
                <div class="sidebar-item" onclick="showPage('dashboard')">Dashboard</div>
                <div class="sidebar-item" onclick="showPage('documentos')">Documentos</div>
            </div>
            <div class="main" id="pageContent">
                </div>
        </div>
    </div>
</div>

<script>
    // 1. Estado Inicial con Persistencia
    let state = JSON.parse(localStorage.getItem('gesdoc_data')) || {
        usuarios: [
            { id: 1, nombre: 'Admin Sistema', correo: 'admin@empresa.com', rol: 'admin', pass: 'admin123' },
            { id: 2, nombre: 'Santo Almonte', correo: 'santo@empresa.com', rol: 'revisor', pass: 'rev123' }
        ],
        documentos: []
    };

    function guardarEstado() {
        localStorage.setItem('gesdoc_data', JSON.stringify(state));
    }

    // 2. Lógica de Login
    function doLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        const user = state.usuarios.find(u => u.correo === email && u.pass === pass);
        
        if (user) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('headerUserName').textContent = user.nombre;
            showPage('dashboard');
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    // 3. Funciones de Navegación
    function showPage(page) {
        const container = document.getElementById('pageContent');
        if (page === 'dashboard') container.innerHTML = '<h2>Dashboard</h2><p>Bienvenida, Vero.</p>';
        if (page === 'documentos') renderDocumentos();
    }

    // 4. Funciones Críticas (Con Persistencia)
    function crearUsuario(nuevoUser) {
        state.usuarios.push(nuevoUser);
        guardarEstado();
    }

    function subirDocumento(doc) {
        state.documentos.push(doc);
        guardarEstado();
        renderDocumentos();
    }

    function aprobarDoc(docId) {
        const doc = state.documentos.find(d => d.id === docId);
        if (doc) {
            doc.estado = 'aprobado';
            guardarEstado();
            renderDocumentos();
        }
    }

    function renderDocumentos() {
        const container = document.getElementById('pageContent');
        container.innerHTML = `<h2>Documentos</h2><table class="table" id="tablaDocs"></table>`;
        // ... (Aquí iría la lógica de pintar la tabla leyendo state.documentos)
    }

    console.log("Sistema GesDoc listo y guardando en localStorage.");
</script>

</body>
</html>
