<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GesDoc</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app" id="app">

  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <i class="ti ti-file-check"></i>
        </div>
        <h2>GesDoc</h2>
        <p>Sistema de Aprobación de Documentos</p>
      </div>

      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input class="form-input" type="email" id="loginEmail" value="admin@empresa.com">
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" type="password" id="loginPass" value="admin123">
      </div>

      <div id="loginError" class="login-error">
        Credenciales incorrectas
      </div>

      <button class="btn btn-primary full" onclick="doLogin()">
        <i class="ti ti-login"></i>
        Iniciar sesión
      </button>
    </div>
  </div>

  <div id="mainApp" class="hidden">

    <div class="header">
      <div class="header-left">
        <i class="ti ti-file-check"></i>
        <span>GesDoc — Sistema de Aprobación</span>
      </div>

      <div class="header-user">
        <span id="headerUserName"></span>
        <div class="header-avatar" id="headerAvatar"></div>
        <button class="header-logout" onclick="doLogout()">
          <i class="ti ti-logout"></i>
        </button>
      </div>
    </div>

    <div class="layout">

      <aside class="sidebar">

  <div class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')">
    <i class="ti ti-home"></i>
    Dashboard
  </div>

  <div class="nav-item" id="nav-documentos" onclick="showPage('documentos')">
    <i class="ti ti-file-text"></i>
    Documentos
  </div>

  <div class="nav-item" id="nav-usuarios" onclick="showPage('usuarios')">
    <i class="ti ti-users"></i>
    Usuarios
  </div>

</aside>

<main class="content">

<div id="page-dashboard">

  <h1 class="page-title">Dashboard</h1>

  <div class="stats-grid" id="statsGrid"></div>

</div>

  <div id="page-documentos" class="hidden">
    <h1>Documentos</h1>

    <table class="table">
      <thead>
        <tr>
          <th>Documento</th>
          <th>Tipo</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="docsTableBody"></tbody>
    </table>
  </div>

  <div id="page-usuarios" class="hidden">
    <h1>Usuarios</h1>

    <table class="table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Cargo</th>
          <th>Correo</th>
          <th>Rol</th>
        </tr>
      </thead>
      <tbody id="usuariosTableBody"></tbody>
    </table>
  </div>

</main>

</div>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
